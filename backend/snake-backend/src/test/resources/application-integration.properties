# ===== 集成测试配置 =====
# 连接 Docker MySQL（端口 3307）和 Docker Redis（端口 6379）
# 需要先启动 docker-compose

# MySQL - 使用独立测试数据库
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/snake_game_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=789456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Hibernate 自动建表
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# 不执行 SQL 初始化脚本
spring.sql.init.mode=never

# Redis - 使用 database 1（避免与开发数据冲突）
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=1
spring.data.redis.timeout=3000ms
spring.data.redis.password=

# JWT 测试密钥（必须与 SecurityConfig 硬编码的密钥一致）
jwt.secret=snake-game-jwt-secret-key-must-be-at-least-256-bits-long-for-hs512
jwt.expiration-ms=86400000
