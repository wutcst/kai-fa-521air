spring.application.name=snake-backend
server.port=8080

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/snake_game?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== Init Scripts =====
spring.sql.init.mode=always
spring.sql.init.schema-locations=file:../../database/sql/schema.sql
spring.sql.init.data-locations=file:../../database/sql/data.sql
spring.sql.init.continue-on-error=true
