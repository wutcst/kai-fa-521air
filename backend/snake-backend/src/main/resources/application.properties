spring.application.name=snake-backend
server.port=8080

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/snake_game?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ===== Init Scripts =====
# 数据库初始化由 docker-compose 的 init 脚本处理，应用启动时不再重复执行
spring.sql.init.mode=never

# ===== Redis Cache =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms

# ===== JWT =====
jwt.secret=snake-game-jwt-secret-key-must-be-at-least-256-bits-long-for-hs512
jwt.expiration-ms=86400000
