<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5d6a7"/>
      <stop offset="50%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#43a047"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
  </defs>
  <!-- 大叶子 -->
  <path d="M100,180 Q30,120 20,50 Q60,30 100,60 Q140,30 180,50 Q170,120 100,180Z" fill="url(#leafGrad)" opacity="0.9"/>
  <!-- 叶脉 -->
  <path d="M100,170 Q100,100 100,65" stroke="#388e3c" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M100,140 Q70,110 45,80" stroke="#388e3c" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M100,140 Q130,110 155,80" stroke="#388e3c" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M100,120 Q78,100 60,70" stroke="#388e3c" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M100,120 Q122,100 140,70" stroke="#388e3c" stroke-width="0.8" fill="none" opacity="0.3"/>
  <!-- 小叶子 -->
  <ellipse cx="155" cy="45" rx="25" ry="12" fill="url(#leafGrad2)" transform="rotate(-30,155,45)" opacity="0.8"/>
  <!-- 圆点装饰 -->
  <circle cx="50" cy="140" r="3" fill="#a5d6a7" opacity="0.5"/>
  <circle cx="160" cy="130" r="2" fill="#c8e6c9" opacity="0.4"/>
  <circle cx="80" cy="90" r="2.5" fill="#81c784" opacity="0.3"/>
</svg>
